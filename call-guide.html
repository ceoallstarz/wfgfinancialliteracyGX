body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--cream);color:#1a2332;min-height:100vh}

/* ══════════════════════════════════════════════════════
   HYPERION CALL GUIDE — Mission HQ light theme
   ══════════════════════════════════════════════════════ */
.hcg { background:#ffffff; border:1px solid #e2e6ea; border-radius:14px; overflow:hidden; }

/* ── Header ── */
.hcg-head { background:#1a2a42; padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
.hcg-brand { display:flex; align-items:center; gap:12px; }
.hcg-icon { width:40px; height:40px; border-radius:10px; background:rgba(201,168,76,.15); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.hcg-brand-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:#fff; letter-spacing:.01em; }
.hcg-brand-sub { font-size:12px; color:rgba(255,255,255,.5); margin-top:2px; }

/* Stage pills */
.hcg-stages { display:flex; gap:8px; flex-wrap:wrap; }
.hcg-stages button.hcg-stg {
  flex-shrink:0; padding:8px 14px; border-radius:24px;
  border:1.5px solid rgba(255,255,255,.18); background:transparent;
  color:rgba(255,255,255,.6); font-size:12px; font-weight:600;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif; cursor:pointer;
  transition:all .18s; white-space:nowrap;
}
.hcg-stages button.hcg-stg.on { background:#c9a84c; color:#1a2a42; border-color:#c9a84c; font-weight:700; }
.hcg-stages button.hcg-stg:hover:not(.on) { border-color:rgba(201,168,76,.5); color:#fff; }

/* ── Sub-tabs (Script / Voicemail / Mindset / Rules) ── */
.hcg-tabs { display:flex; gap:6px; flex-wrap:wrap; padding:14px 20px 0; background:#f9fafb; border-bottom:1px solid #e2e6ea; }
.hcg-tab {
  padding:8px 16px; border-radius:8px 8px 0 0; border:1px solid #e2e6ea; border-bottom:none;
  background:#f4f6f8; color:#6b7280; font-size:13px; font-weight:600;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif; cursor:pointer; transition:all .15s;
  margin-bottom:-1px;
}
.hcg-tab:hover { background:#fdf6e3; color:#8a6a1e; }
.hcg-tab.on { background:#ffffff; color:#1a2a42; border-color:#e2e6ea; border-bottom:2px solid #c9a84c; font-weight:700; }

/* ── Body / panes ── */
.hcg-body { padding:20px; }
.hcg-pane { display:none; }
.hcg-pane.on { display:block; }

/* Stage intro card */
.hcg-si { display:flex; align-items:center; gap:14px; background:#1a2a42; border-radius:12px; padding:16px 18px; margin-bottom:18px; }
.hcg-si-dot { width:14px; height:14px; border-radius:50%; background:#c9a84c; flex-shrink:0; }
.hcg-si-name { font-size:15px; font-weight:700; color:#fff; }
.hcg-si-sub { font-size:12px; color:rgba(255,255,255,.5); margin-top:2px; }

/* Script sections */
.hcg-sec { margin-bottom:20px; }
.hcg-lbl {
  font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:#6b7280; margin-bottom:8px; display:flex; align-items:center; gap:10px;
}
.hcg-lbl::after { content:''; flex:1; height:1px; background:#e2e6ea; }
.hcg-txt {
  background:#fef9ec; border-left:3px solid #c9a84c; border-radius:0 10px 10px 0;
  padding:13px 16px; color:#1a2332; font-size:15px; line-height:1.7; font-style:italic;
}

/* Coach note */
.hcg-cn-btn {
  display:inline-flex; align-items:center; gap:6px; margin-top:8px;
  background:#fdf6e3; border:1px solid rgba(201,168,76,.3); border-radius:8px;
  padding:6px 12px; font-size:12px; font-weight:600; color:#8a6a1e; cursor:pointer;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif; transition:background .15s;
}
.hcg-cn-btn:hover { background:#fdf0c8; }
.hcg-cn { display:none; background:#f0f7ec; border:1px solid rgba(99,153,34,.25); border-top:none; border-radius:0 0 8px 8px; padding:10px 12px; font-size:13px; color:#2d5010; line-height:1.6; margin-top:-1px; }
.hcg-cn.on { display:block; }

/* Conversation exchange (Them / You) */
.hcg-exch { display:flex; flex-direction:column; gap:10px; }
.hcg-bbl { display:flex; flex-direction:column; gap:6px; }
.hcg-who {
  display:inline-flex; align-self:flex-start; font-size:10px; font-weight:800;
  letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:6px;
}
.hcg-who.hcg-them { background:#eef1f6; color:#1a2a42; }
.hcg-who.hcg-you { background:#fdf6e3; color:#8a6a1e; }
.hcg-bbl-txt {
  background:#fef9ec; border-left:3px solid #c9a84c; border-radius:0 10px 10px 0;
  padding:11px 16px; color:#1a2332; font-size:14px; line-height:1.65; font-style:italic;
}
.hcg-bbl:has(.hcg-them) .hcg-bbl-txt { background:#f9fafb; border-left-color:#cbd5e1; }

/* Tip box */
.hcg-tip { display:flex; gap:10px; align-items:flex-start; background:#fdf6e3; border:1px solid rgba(201,168,76,.3); border-radius:10px; padding:12px 14px; margin-top:14px; }
.hcg-tip-txt { font-size:13px; color:#8a6a1e; line-height:1.6; }

/* ── Bottom nav bar ── */
.hcg-bar { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 20px; border-top:1px solid #e2e6ea; background:#f9fafb; }
.hcg-bnav {
  padding:9px 16px; border-radius:8px; border:1px solid #e2e6ea; background:#fff;
  color:#1a2a42; font-size:13px; font-weight:700; cursor:pointer; transition:all .15s;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
}
.hcg-bnav:hover:not(:disabled) { background:#fdf6e3; border-color:rgba(201,168,76,.4); }
.hcg-bnav:disabled { opacity:.35; cursor:not-allowed; }
.hcg-obj-btn {
  padding:9px 18px; border-radius:8px; border:1px solid rgba(201,168,76,.4);
  background:#c9a84c; color:#1a2a42; font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif; transition:all .15s;

.hcg-obj-btn:hover { background:#e8c97a; }

.hcg-vm { background:#fff; border:1px solid #e2e6ea; border-radius:12px; padding:16px; margin-bottom:14px; }
.hcg-vm-lbl { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#6b7280; margin-bottom:10px; }
.hcg-vm-txt { background:#fef9ec; border-left:3px solid #c9a84c; border-radius:0 10px 10px 0; padding:13px 16px; color:#1a2332; font-size:14px; line-height:1.7; font-style:italic; }
.hcg-vm-meta { font-size:12px; color:#8a6a1e; margin-top:8px; font-weight:600; }

/* ── Mindset pane ── */

.hcg-mind-n {

  font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;

.hcg-mind-h { font-size:14px; font-weight:700; color:#1a2a42; margin-bottom:4px; }
.hcg-mind-b { font-size:13px; color:#6b7280; line-height:1.65; }

/* ── Rules pane ── */
.hcg-rule { display:flex; gap:14px; padding:14px 0; border-bottom:1px solid #f1f3f5; }
.hcg-rule:last-child { border-bottom:none; }
.hcg-rule-ic {
  width:32px; height:32px; border-radius:8px; background:#fdf6e3; color:#8a6a1e;

.hcg-rule-h { font-size:14px; font-weight:700; color:#1a2a42; margin-bottom:4px; }
.hcg-rule-b { font-size:13px; color:#6b7280; line-height:1.65; }

/* ── Objection overlay ── */
.hcg-ov {
  position:fixed; inset:0; background:rgba(15,37,64,.5); z-index:1000;
  display:flex; align-items:flex-end; justify-content:center;

}
.hcg-ov.on { opacity:1; visibility:visible; }
.hcg-sheet {
  background:#fff; border-radius:16px 16px 0 0; width:100%; max-width:640px;
  max-height:80vh; display:flex; flex-direction:column; overflow:hidden;
  transform:translateY(20px); transition:transform .25s;
}
.hcg-ov.on .hcg-sheet { transform:translateY(0); }
.hcg-sh-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:#1a2a42; }
.hcg-sh-title { font-size:15px; font-weight:700; color:#c9a84c; }
.hcg-sh-close { width:32px; height:32px; border-radius:8px; border:none; background:rgba(255,255,255,.1); color:#fff; font-size:14px; cursor:pointer; }
.hcg-sh-close:hover { background:rgba(255,255,255,.2); }
.hcg-sh-body { padding:8px 20px 20px; overflow-y:auto; }

.hcg-oi { border-bottom:1px solid #f1f3f5; }
.hcg-oi:last-child { border-bottom:none; }
.hcg-oq {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:14px 0; cursor:pointer; font-size:14px; font-weight:700; color:#1a2a42;
}
.hcg-oq.urg { color:#b02020; }
.urg-badge { font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:#b02020; background:#fdeaea; border-radius:6px; padding:3px 8px; }
.arr { color:#9ca3af; font-size:14px; transition:transform .2s; }
.hcg-oq.open .arr { transform:rotate(180deg); }
.hcg-oa { display:none; padding:0 0 14px; font-size:13.5px; color:#374151; line-height:1.7; }
.hcg-oa.on { display:block; }
.hcg-otip { margin-top:8px; background:#fdf6e3; border:1px solid rgba(201,168,76,.3); border-radius:8px; padding:8px 12px; font-size:12px; color:#8a6a1e; }

@media (max-width:640px) {
  .hcg-head { padding:16px; }
  .hcg-body { padding:16px; }
  .hcg-tabs { padding:12px 16px 0; }
}

   a:'"I appreciate you looking out for me — genuinely. Tell me what you heard, because I want to understand where that\'s coming from." [Listen.] "Here\'s what I know: it\'s Revolution Financial Management, a Transamerica company — $700 billion in assets, been around since the 1800s. And here\'s what I can tell you about my own experience: I haven\'t paid them a dollar. The families we help don\'t pay us either. We\'re paid by the carriers. Come to the free session and see for yourself — bring your skepticism. I actually want your honest opinion after."',
   tip:'"Bring your skepticism" disarms the objection completely. You\'re not running from the pushback — you\'re inviting it. That\'s trustworthy.'},
  {q:'"I\'m really busy."',urgent:false,
   a:'"I hear you — it\'s only 45 minutes on Zoom, you don\'t have to go anywhere. Thursday at 6 or Saturday at 9 — which is the less crazy one for you?"',
   tip:'Acknowledge it once. Then re-close immediately with the binary choice.'},
  {q:'"Just send me the info."',urgent:false,
   a:'"I\'ll send you the link — but honestly it doesn\'t do it justice on paper. It\'s one of those things you have to experience. Can I put you down for Thursday or Saturday and you decide closer to the time?"',
   tip:'Always redirect from "send me info" to the live event. Reading about it is not attending it.'},
  {q:'"I can\'t afford financial services."',urgent:false,
   a:'"That\'s exactly why I thought of you — it\'s completely free. No fee ever to sit down with us. The families who need this most are the ones the traditional industry ignores. That\'s who we built this for. Thursday or Saturday?"',
   tip:'This objection is actually your best opening. The "990 out of 1,000" framing was made for this moment.'},
  {q:'"Let me think about it."',urgent:false,
   a:'"Of course — let me send you the link now and you decide closer to the time. Thursday at 6 or Saturday at 9 — which should I put you down for tentatively?"',
   tip:'"Tentatively" reduces the commitment. They\'re not locked in — they just have a link and a time. That\'s enough.'},
  {q:'"Are you trying to recruit me?"',urgent:false,
   a:'"I\'ll be straight with you — eventually I\'d love to share the business side if you\'re open to it. But that\'s not why I\'m inviting you right now. The financial education is genuinely valuable on its own. Come for that first. Everything else is a conversation for after."',
   tip:'Answer it directly every time. The person who answers this honestly is the person you trust with your money.'},
  {q:'"I\'m not really into financial stuff."',urgent:false,
   a:'"Most people feel that way — honestly because it was never explained in a way that made sense. That\'s kind of the whole point of this session. It\'s not complicated or dry. I think it\'d surprise you. Just 45 minutes — Thursday or Saturday?"',
   tip:'Validate the feeling. Then reframe why this is different. Then close.'},
  {q:'"I already have a financial advisor."',urgent:false,
   a:'"That\'s great — honestly most people don\'t. I\'m not here to replace anyone. I\'d just love to show you what we do for families and let you decide if there\'s a gap we could help fill. It\'s completely free and there\'s no obligation. What do you have to lose by taking 45 minutes? Thursday or Saturday?"',
   tip:'Never compete with their current advisor. Position this as complementary.'},
];
const hcgMindset=[
  {n:1,title:'Your newness is not a weakness.',body:'When someone you personally know and trust calls you excited about something new — you pay attention. That\'s not a liability. That\'s a personal introduction. It\'s the most powerful thing in Trustworthy Selling.'},
  {n:2,title:'You are the bridge, not the expert.',body:'You don\'t need to know everything. Your job is to get them in the room. Your mentor or SMD is the expert. Edify them honestly and let the event do the work.'},
  {n:3,title:'Consistency theory — applied to you.',body:'Your internal belief has to match your ask. Before every call: "I am calling because I genuinely believe this will help this person." If you believe it, they\'ll hear it. If you don\'t yet — go back to the session until you do.'},
  {n:4,title:'30 calls a week from your warm list gets GX1.',body:'You don\'t need cold leads. You need your phone, your contacts, and this script. Six calls a day, five days. The people who know you are the easiest yes — because trust is already there.'},
];
const hcgRules=[
  {icon:'👂',title:'Listen before you ask.',body:'The 30–60 seconds in the open is not filler. It\'s where trust is built. Every word of the ask lands harder because of it.'},
  {icon:'✋',title:'Stop after "Thursday or Saturday?"',body:'Every word after the close costs you a yes. The silence is theirs — let them use it. Count to five if you have to. Do not fill the gap.'},
  {icon:'🛡️',title:'Answer "is there a business side?" directly.',body:'Always. Every time. Transparency is your competitive advantage. No one in this industry does it — you will.'},
  {icon:'⏱️',title:'Send the link within 5 minutes of the yes.',body:'Don\'t let them cool off. A warm yes turns cold quickly. Text them the link before you dial the next person.'},
  {icon:'💬',title:'Voicemail + text is always better than either alone.',body:'They see your name twice in two minutes while you\'re still fresh. Send the text within 2 minutes of hanging up.'},
  {icon:'🔁',title:'One follow-up after a no-answer. One.',body:'"Hey [Name] — wanted to make sure you got my message. Still want me to send the link?" One follow-up is persistence. Two is pressure.'},
];

var hSt = 0;

function showTab(id, btn) {
  document.querySelectorAll('.tpanel').forEach(function(p){p.classList.remove('act');});
  document.querySelectorAll('.npill').forEach(function(b){b.classList.remove('act');});
  var p = document.getElementById('tp-'+id); if(p) p.classList.add('act');
  if(btn) btn.classList.add('act');
}

function hTab(id, btn) {
  document.querySelectorAll('.hcg-pane').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.hcg-tab').forEach(function(b){b.classList.remove('on');});
  var p = document.getElementById('hp-'+id); if(p) p.classList.add('on');
  if(btn) btn.classList.add('on');
}

function hRenderStages() {
  var bar = document.getElementById('hcg-stg-bar'); if(!bar) return;
  bar.innerHTML = '';
  hcgStages.forEach(function(s,i){
    var b = document.createElement('button');
    b.className='hcg-stg'+(i===hSt?' on':'');
    b.textContent = s.label;
    b.onclick=(function(n){return function(){hSetStage(n);};})(i);
    bar.appendChild(b);
  });
}

function hRenderScript() {
  var s=hcgStages[hSt], el=document.getElementById('hcg-sc'); if(!el) return;
  var h='<div class="hcg-si"><div class="hcg-si-dot"></div><div><div class="hcg-si-name">'+s.label+'</div><div class="hcg-si-sub">'+s.sub+'</div></div></div>';
  function blk(lbl,txt,coach){
    if(!txt) return '';
    var r='<div class="hcg-sec"><div class="hcg-lbl">'+lbl+'</div><div class="hcg-txt">'+txt+'</div>';
    if(coach) r+='<button class="hcg-cn-btn" onclick="hCoach(this)">💡 Coach note</button><div class="hcg-cn">'+coach+'</div>';
    return r+'</div>';
  }
  h+=blk('Open',s.open,s.open_coach);
  h+=blk('Bridge',s.bridge,s.bridge_coach);
  h+=blk('The Ask',s.ask,s.ask_coach);
  if(s.yes_them&&s.yes_you){
    h+='<div class="hcg-sec"><div class="hcg-lbl">When they say yes</div><div class="hcg-exch">';
    h+='<div class="hcg-bbl"><span class="hcg-who hcg-them">Them</span><div class="hcg-bbl-txt">'+s.yes_them+'</div></div>';
    h+='<div class="hcg-bbl"><span class="hcg-who hcg-you">You</span><div class="hcg-bbl-txt">'+s.yes_you+'</div></div>';
    h+='</div>';
    if(s.yes_coach) h+='<button class="hcg-cn-btn" onclick="hCoach(this)" style="margin-top:8px">💡 Coach note</button><div class="hcg-cn">'+s.yes_coach+'</div>';
    h+='</div>';
  }
  if(s.tip) h+='<div class="hcg-tip"><span style="font-size:18px;flex-shrink:0">⭐</span><div class="hcg-tip-txt">'+s.tip+'</div></div>';
  if(s.alt) h+='<div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.1em;margin:14px 0 8px">Alternative: '+(s.alt_title||'Variation')+'</div><div style="background: #ffffff;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px;font-size:14px;line-height:1.75;white-space:pre-line;color:rgba(255,255,255,.85);">'+s.alt+'</div>';
  if(s.alt_tip) h+='<div class="hcg-tip" style="margin-top:8px"><span style="font-size:18px;flex-shrink:0">💡</span><div class="hcg-tip-txt">'+s.alt_tip+'</div></div>';
  el.innerHTML=h;
}

function hRenderVM() {
  var s=hcgStages[hSt], el=document.getElementById('hcg-vm'); if(!el) return;
  var h='';
  if(s.vm_text) h+='<div class="hcg-vm"><div class="hcg-vm-lbl">Voicemail Script</div><div class="hcg-vm-txt">'+s.vm_text+'</div>'+(s.vm_time?'<div class="hcg-vm-meta">⏱ '+s.vm_time+'</div>':'')+'</div>';
  if(s.text_text) h+='<div class="hcg-vm"><div class="hcg-vm-lbl">Follow-Up Text</div><div class="hcg-vm-txt">'+s.text_text+'</div></div>';
  el.innerHTML=h;
}

function hRenderMindset() {
  var el=document.getElementById('hcg-ms'); if(!el) return;
  var h='';
  hcgMindset.forEach(function(m){ h+='<div class="hcg-mind"><div class="hcg-mind-n">'+(m.n||'')+'</div><div><div class="hcg-mind-h">'+(m.title||m.t||'')+'</div><div class="hcg-mind-b">'+(m.body||m.b||'')+'</div></div></div>'; });
  el.innerHTML=h;
}

function hRenderRules() {
  var el=document.getElementById('hcg-rl'); if(!el) return;
  var h='';
  hcgRules.forEach(function(r){ h+='<div class="hcg-rule"><div class="hcg-rule-ic">'+(r.icon||'📌')+'</div><div><div class="hcg-rule-h">'+(r.title||r.t||'')+'</div><div class="hcg-rule-b">'+(r.body||r.b||'')+'</div></div></div>'; });
  el.innerHTML=h;
}

function hRenderObj() {
  var el=document.getElementById('hcg-olist'); if(!el) return;
  var h='';
  hcgObjections.forEach(function(o,i){
    h+='<div class="hcg-oi"><div class="hcg-oq'+(o.urgent?' urg':'')+'" onclick="hObjToggle(this,'+i+')">';
    h+='<span>'+o.q+'</span><div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">';
    if(o.urgent) h+='<span class="urg-badge">Handle now</span>';
    h+='<span class="arr">⌄</span></div></div>';
    h+='<div class="hcg-oa" id="hoa-'+i+'">'+o.a+(o.tip?'<div class="hcg-otip">💡 '+o.tip+'</div>':'')+'</div></div>';
  });
  el.innerHTML=h;
}

function hCoach(btn) {
  var cn=btn.nextElementSibling; cn.classList.toggle('on');
  btn.style.borderRadius=cn.classList.contains('on')?'8px 8px 0 0':'8px';
}

function hObjToggle(q,i) {
  var a=document.getElementById('hoa-'+i), open=a.classList.contains('on');
  document.querySelectorAll('.hcg-oa').forEach(function(e){e.classList.remove('on');});
  document.querySelectorAll('.hcg-oq').forEach(function(e){e.classList.remove('open');});
  if(!open){a.classList.add('on');q.classList.add('open');}
}

function hObjOpen(){var ov=document.getElementById('hcg-ov');if(ov){ov.classList.add('on');document.body.style.overflow='hidden';}}
function hObjClose(){var ov=document.getElementById('hcg-ov');if(ov){ov.classList.remove('on');document.body.style.overflow='';}}
function hObjBg(e){if(e.target===document.getElementById('hcg-ov'))hObjClose();}

function hSetStage(i) {
  hSt=i; hRenderStages(); hRenderScript(); hRenderVM();
  var prev=document.getElementById('hcg-prev'),next=document.getElementById('hcg-next');
  if(prev) prev.disabled=(i===0); if(next) next.disabled=(i===hcgStages.length-1);
}
function hMove(d){var n=hSt+d;if(n>=0&&n<hcgStages.length)hSetStage(n);}

// Init
hRenderStages(); hSetStage(0); hRenderMindset(); hRenderRules(); hRenderObj();

</script>
</body>
</html>
